<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Torquesmart - App Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        .logo-container {
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 48px;
            font-weight: bold;
            color: #0f0f0f;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }

        .app-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
        }

        .launch-button {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: #0f0f0f;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.3);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .launch-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 255, 136, 0.4);
        }

        .launch-button:active {
            transform: translateY(0);
        }

        .launch-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .launch-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .info-text {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .feature {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature:hover {
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(-2px);
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 12px;
            color: #ccc;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .loading-text {
            margin-top: 10px;
            font-size: 14px;
            color: #00ff88;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 136, 0.5);
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) translateX(0px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% { 
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 15px;
            }
            
            .app-title {
                font-size: 28px;
            }
            
            .launch-button {
                padding: 16px 32px;
                font-size: 16px;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="app-container">
        <div class="logo-container">
            <div class="logo">T</div>
        </div>
        
        <h1 class="app-title">Torquesmart</h1>
        <p class="app-subtitle">Gestión Inteligente de Flotas</p>
        
        <button class="launch-button" onclick="launchApp()">
            🚀 Abrir Torquesmart
        </button>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Iniciando aplicación...</div>
        </div>
        
        <p class="info-text">
            Sistema completo de gestión de flotas con mantenimiento, 
            vehículos, conductores y reportes en tiempo real.
        </p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🚗</div>
                <div class="feature-text">Gestión de Vehículos</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔧</div>
                <div class="feature-text">Mantenimiento</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div class="feature-text">Conductores</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Reportes</div>
            </div>
        </div>
    </div>

    <script>
        // Crear partículas animadas
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Función para abrir la aplicación
        function launchApp() {
            const button = document.querySelector('.launch-button');
            const loading = document.getElementById('loading');
            
            // Mostrar loading
            button.style.display = 'none';
            loading.style.display = 'block';
            
            // URL de la aplicación Torquesmart
            const appUrl = 'http://192.168.0.18:8080';
            
            // Intentar abrir en nueva ventana primero
            setTimeout(() => {
                try {
                    const newWindow = window.open(appUrl, '_blank', 'width=device-width, height=device-height');
                    
                    if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                        // Si popup es bloqueado, redirigir en la misma ventana
                        window.location.href = appUrl;
                    } else {
                        // Ventana abierta exitosamente
                        newWindow.focus();
                    }
                } catch (error) {
                    // Fallback: redirigir directamente
                    window.location.href = appUrl;
                }
            }, 1000);
        }

        // Detectar dispositivo y ajustar comportamiento
        function detectDevice() {
            const userAgent = navigator.userAgent;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
            const isAndroid = /Android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/i.test(userAgent);
            
            if (isMobile) {
                // Ajustes para móviles
                document.querySelector('.app-container').style.padding = '15px';
                
                if (isAndroid) {
                    console.log('Dispositivo Android detectado');
                } else if (isIOS) {
                    console.log('Dispositivo iOS detectado');
                }
            }
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            detectDevice();
            
            // Auto-lanzar después de 2 segundos (opcional)
            setTimeout(() => {
                const autoLaunch = confirm('¿Deseas abrir Torquesmart automáticamente?');
                if (autoLaunch) {
                    launchApp();
                }
            }, 2000);
        });

        // Prevenir zoom en móviles
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        // Manejar conexión offline
        window.addEventListener('online', function() {
            console.log('Conexión restaurada');
        });

        window.addEventListener('offline', function() {
            alert('Sin conexión a internet. Conéctate para usar Torquesmart.');
        });
    </script>
</body>
</html>
